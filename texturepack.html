    <div id="results" style="display: flex; flex-wrap: wrap; gap: 16px; padding: 16px 0;">
        <p>Loading texture packs...</p>
    </div>

    <script>
        const PROJECT_TYPE = 'resourcepack';

        async function loadTexturePacks() {
            const loader = document.getElementById('loader').value;
            const version = document.getElementById('mcVersion').value;
            const search = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Loading texture packs...</p>';

            try {
                const facets = [[`project_type:${PROJECT_TYPE}`]];
                if (loader) facets.push([`categories:${loader}`]);
                if (version) facets.push([`versions:${version}`]);

                let url = `https://api.modrinth.com/v2/search?facets=${encodeURIComponent(JSON.stringify(facets))}&limit=50`;
                if (search) url += `&query=${encodeURIComponent(search)}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.hits && data.hits.length > 0) {
                    renderTexturePacks(data.hits);
                } else {
                    resultsDiv.innerHTML = '<p>No texture packs found.</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        function renderTexturePacks(packs) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            packs.forEach(pack => {
                const card = document.createElement('div');
                card.style.cssText = `
                    background: #1a1a1a;
                    border: 1px solid #333;
                    border-radius: 8px;
                    padding: 16px;
                    width: 200px;
                    text-align: center;
                    transition: transform 0.2s;
                `;
                card.onmouseover = () => card.style.transform = 'translateY(-4px)';
                card.onmouseout = () => card.style.transform = 'translateY(0)';

                const icon = pack.icon_url || 'https://via.placeholder.com/64/333/666?text=No+Icon';
                const name = pack.title || 'Unknown';
                const description = pack.description || 'No description';
                const downloads = pack.downloads || 0;
                const url = `https://modrinth.com/resourcepack/${pack.slug}`;

                card.innerHTML = `
                    <img src="${icon}" alt="${name}" style="width: 64px; height: 64px; border-radius: 8px; background: #333; object-fit: cover;">
                    <h3 style="font-size: 16px; margin: 8px 0 4px; color: white;">${name}</h3>
                    <p style="font-size: 12px; color: #aaa; height: 40px; overflow: hidden; margin: 4px 0;">${description}</p>
                    <span style="font-size: 12px; color: #888;">⬇️ ${downloads.toLocaleString()}</span>
                    <br>
                    <a href="${url}" target="_blank" style="display: inline-block; margin-top: 8px; padding: 6px 16px; background: #4CAF50; color: white; text-decoration: none; border-radius: 4px; border: none;">Download</a>
                `;

                resultsDiv.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadTexturePacks();
            document.getElementById('searchBtn').addEventListener('click', loadTexturePacks);
            document.getElementById('loader').addEventListener('change', loadTexturePacks);
            document.getElementById('mcVersion').addEventListener('change', loadTexturePacks);
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loadTexturePacks();
            });
        });
    </script>
